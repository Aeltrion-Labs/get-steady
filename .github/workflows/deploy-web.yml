name: Deploy marketing site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint marketing site
        run: pnpm --filter @get-steady/web lint

      - name: Test marketing site
        run: pnpm --filter @get-steady/web test

      - name: Build marketing site
        run: pnpm --filter @get-steady/web build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing site
        run: pnpm --filter @get-steady/web build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

      - uses: actions/deploy-pages@v5
        id: deployment
