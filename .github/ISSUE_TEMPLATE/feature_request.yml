name: Feature request
description: Suggest an improvement that fits the current product scope.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the narrowest useful change.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: Explain why this fits the app's local-first, focused product direction.
